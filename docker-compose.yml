services:
  postgres:
    image: postgres:17-alpine
    container_name: garagebalance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garagebalance}
      POSTGRES_USER: ${POSTGRES_USER:-garagebalance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garagebalance_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garagebalance} -d ${POSTGRES_DB:-garagebalance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/GarageBalance.Api/Dockerfile
    container_name: garagebalance-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-garagebalance};Username=${POSTGRES_USER:-garagebalance};Password=${POSTGRES_PASSWORD:-garagebalance_dev_password}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-change-this-development-key-before-real-data-32}
      Cors__AllowedOrigins__0: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${API_PORT:-5080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: garagebalance-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
